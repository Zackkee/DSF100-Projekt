<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Registrera kund – Nordic Haven Hotel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="index.html">← Tillbaka till start</a>
</nav>

<h1>Kundregistrering</h1>

<div class="form-container">
    <form id="form">
        <label for="fname">Förnamn</label>
        <input type="text" id="fname" required placeholder="Skriv ditt förnamn">

        <label for="lname">Efternamn</label>
        <input type="text" id="lname" required placeholder="Skriv ditt efternamn">

        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="exempel@mail.com">

        <label for="phone">Telefon</label>
        <input type="text" id="phone" placeholder="070-1234567">

        <button type="submit">Registrera</button>
    </form>

    <p id="msg"></p>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    const data = {
        firstname: document.getElementById("fname").value,
        lastname: document.getElementById("lname").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value
    };

    fetch("/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(result => {
        const msgEl = document.getElementById("msg");

        if (result.status === "success") {
            msgEl.innerText = "✅ Registreringen lyckades! Du skickas vidare...";
            msgEl.className = "success";

            setTimeout(() => {
                window.location.href =
                    `booking.html?customer_id=${result.customer_id}`;
            }, 2000);
        } else {
            msgEl.innerText = "❌ " + result.message;
            msgEl.className = "error";
        }
    })
    .catch(() => {
        const msgEl = document.getElementById("msg");
        msgEl.innerText = "❌ Något gick fel, försök igen.";
        msgEl.className = "error";
    });
});
</script>

</body>
</html>
