<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Bokning – Nordic Haven Hotel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Bekräfta bokning</h1>

<div id="rooms"></div>
<p id="price"></p>

<form id="booking-form">
    <label>Kund-ID</label>
    <input type="text" id="customer_id" readonly>

    <button type="submit">Bekräfta bokning</button>
</form>

<p id="message"></p>

<script>
// ===== Hämta kund-id från URL =====
const params = new URLSearchParams(window.location.search);
const customerId = params.get("customer_id");
document.getElementById("customer_id").value = customerId;

// ===== Hämta bokningsinfo från backend =====
fetch("/api/getBookingSummary")
    .then(res => res.json())
    .then(data => {
        if (data.status !== "success") {
            document.getElementById("message").innerText =
                "❌ Ingen aktiv bokning hittades.";
            document.getElementById("message").className = "error";
            return;
        }

        // Visa rum
        document.getElementById("rooms").innerHTML =
            "<h3>Valda rum</h3>" +
            data.rooms.map(r =>
                `${r.name} – ${r.price} SEK / natt`
            ).join("<br>");

        // Visa pris (redan beräknat av backend)
        document.getElementById("price").innerText =
            `Totalpris: ${data.total_price} SEK
Rabatt: ${data.discount * 100} %
Att betala: ${data.final_price} SEK`;
    })
    .catch(() => {
        document.getElementById("message").innerText =
            "❌ Kunde inte hämta bokningsinformation.";
        document.getElementById("message").className = "error";
    });

// ===== Bekräfta bokning =====
document.getElementById("booking-form").addEventListener("submit", e => {
    e.preventDefault();

    fetch("/api/bookRoom", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ customer_id: customerId })
    })
    .then(res => res.json())
    .then(data => {
        const msg = document.getElementById("message");

        if (data.status === "success") {
            msg.innerText = "✅ Bokningen är bekräftad! Tack för din bokning.";
            msg.className = "success";

            setTimeout(() => {
                window.location.href = "index.html";
            }, 3000);
        } else {
            msg.innerText = "❌ Bokningen misslyckades: " + data.message;
            msg.className = "error";
        }
    })
    .catch(() => {
        const msg = document.getElementById("message");
        msg.innerText = "❌ Ett tekniskt fel uppstod.";
        msg.className = "error";
    });
});
</script>

</body>
</html>
