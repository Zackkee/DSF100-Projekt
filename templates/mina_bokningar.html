<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.my_bookings }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <nav style="display:flex; justify-content:space-between; align-items:center; padding: 15px 30px;">
        <div>
            <a class="back" href="/">{{ t.back_to_home }}</a>
        </div>

        <div>
            <button onclick="changeLanguage('sv')" style="
                padding: 8px 14px;
                margin-right: 8px;
                border: none;
                border-radius: 20px;
                cursor: pointer;">
                Svenska
            </button>

            <button onclick="changeLanguage('en')" style="
                padding: 8px 14px;
                border: none;
                border-radius: 20px;
                cursor: pointer;">
                English
            </button>
        </div>
    </nav>
</header>

<div class="container">

    <h1>{{ t.my_bookings }}</h1>

    <form id="idForm" class="card">
        <label>
            {{ t.email }}
            <input type="email" id="email" name="email" required placeholder="{{ t.email_placeholder }}">
        </label>
        <button type="submit">{{ t.show_bookings }}</button>
    </form>

    <p id="info" class="info"></p>

    <table id="table" style="display:none;">
        <thead>
            <tr>
                <th>{{ t.booking_id }}</th>
                <th>{{ t.room_id }}</th>
                <th>{{ t.room_type }}</th>
                <th>{{ t.check_in }}</th>
                <th>{{ t.check_out }}</th>
                <th>{{ t.price }}</th>
                <th>{{ t.actions }}</th>
            </tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>

</div>

<script>
const uiText = {
    noBookingsFound: "{{ t.no_bookings_found }}",
    bookingFetchError: "{{ t.booking_fetch_error }}",
    confirmCancel: "{{ t.confirm_cancel }}",
    cancelError: "{{ t.cancel_error }}",
    cancelButton: "{{ t.cancel }}"
};

function changeLanguage(lang) {
    fetch(`/set_language/${lang}`)
        .then(response => response.json())
        .then(data => {
            if (data.status === "success") {
                location.reload();
            }
        })
        .catch(() => {
            console.error("Language change failed");
        });
}

let savedEmail = null;

document.getElementById("idForm").addEventListener("submit", function(e) {
    e.preventDefault();
    savedEmail = document.getElementById("email").value;
    getBookings(savedEmail);
});

function getBookings(email) {
    fetch("/api/Mina_bokningar.html?email=" + encodeURIComponent(email))
        .then(res => res.json())
        .then(data => {
            const table = document.getElementById("table");
            const rows = document.getElementById("rows");
            rows.innerHTML = "";

            if (data.status === "success" && data.bookings.length > 0) {
                data.bookings.forEach(b => {
                    const tr = document.createElement("tr");

                    tr.innerHTML = `
                        <td>${b.booking_id}</td>
                        <td>${b.room_id}</td>
                        <td>${b.room_name}</td>
                        <td>${b.check_in}</td>
                        <td>${b.check_out}</td>
                        <td>${b.price} SEK</td>
                        <td>
                            <button class="cancel"
                                onclick="removeBooking(${b.booking_id}, ${b.room_id})">
                                ${uiText.cancelButton}
                            </button>
                        </td>
                    `;

                    rows.appendChild(tr);
                });

                table.style.display = "table";
                document.getElementById("info").innerText = "";
            } else {
                table.style.display = "none";
                document.getElementById("info").innerText = uiText.noBookingsFound;
            }
        })
        .catch(() => {
            document.getElementById("info").innerText = uiText.bookingFetchError;
        });
}

function removeBooking(bookingId, roomId) {
    if (!confirm(uiText.confirmCancel)) return;

    fetch("/api/cancelBooking", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            booking_id: bookingId,
            room_id: roomId
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        getBookings(savedEmail);
    })
    .catch(() => {
        alert(uiText.cancelError);
    });
}
</script>

</body>
</html>
