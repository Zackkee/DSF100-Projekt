<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mina bokningar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <a class="back" href="/">← Till startsidan</a>

    <h1>Mina bokningar</h1>

<form id="idForm" class="card">
    <label>
        Email
        <input type="email" id="email" name="email" required>
    </label>
    <button type="submit">Visa bokningar</button>
</form>

    <p id="info" class="info"></p>

    <table id="table" style="display:none;">
        <thead>
            <tr>
                <th>Bokning</th>
                <th>Rum</th>
                <th>Typ</th>
                <th>Incheckning</th>
                <th>Utcheckning</th>
                <th>Pris</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>

</div>

<script>
let savedEmail = null;

document.getElementById("idForm").addEventListener("submit", function(e) {
    e.preventDefault();
    savedEmail = document.getElementById("email").value;
    getBookings(savedEmail);
});

function getBookings(email) {
    fetch("/api/Mina_bokningar.html?email=" + email)
        .then(res => res.json())
        .then(data => {
            const table = document.getElementById("table");
            const rows = document.getElementById("rows");
            rows.innerHTML = "";

            if (data.status === "success" && data.bookings.length > 0) {
                data.bookings.forEach(b => {
                    const tr = document.createElement("tr");

                    tr.innerHTML =
                        `<td>${b.booking_id}</td>
                         <td>${b.room_id}</td>
                         <td>${b.room_name}</td>
                         <td>${b.check_in}</td>
                         <td>${b.check_out}</td>
                        <td>${b.price} SEK</td>
                         <td>
                            <button class="cancel"
                              onclick="removeBooking(${b.booking_id}, ${b.room_id})">
                              Avboka
                            </button>
                         </td>`;

                    rows.appendChild(tr);
                });

                table.style.display = "table";
                document.getElementById("info").innerText = "";
            } else {
                table.style.display = "none";
                document.getElementById("info").innerText =
                    "Inga bokningar hittades";
            }
        })
        .catch(() => {
            document.getElementById("info").innerText =
                "Fel vid hämtning av bokningar";
        });
}

function removeBooking(bookingId, roomId) {
    if (!confirm("Vill du avboka?")) return;

    fetch("/api/cancelBooking", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            booking_id: bookingId,
            room_id: roomId
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        getBookings(savedEmail);
    })
    .catch(() => {
        alert("Fel vid avbokning");
    });
}
</script>

</body>
</html>
