<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrera kund – Nordic Haven Hotel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <nav style="display:flex; justify-content:space-between; align-items:center; padding: 15px 30px;">
        <div>
            <a href="/">{{ t.back_to_home }}</a>
        </div>

        <div>
            <button onclick="changeLanguage('sv')" style="
                padding: 8px 14px;
                margin-right: 8px;
                border: none;
                border-radius: 20px;
                cursor: pointer;">
                Svenska
            </button>

            <button onclick="changeLanguage('en')" style="
                padding: 8px 14px;
                border: none;
                border-radius: 20px;
                cursor: pointer;">
                English
            </button>
        </div>
    </nav>
</header>

<main class="container" style="max-width: 700px; margin: 40px auto;">
    <h1>{{ t.customer_registration }}</h1>

    <div class="form-container">
        <form id="form">
            <label for="fname">{{ t.first_name }}</label>
            <input type="text" id="fname" required placeholder="{{ t.first_name_placeholder }}">

            <label for="lname">{{ t.last_name }}</label>
            <input type="text" id="lname" required placeholder="{{ t.last_name_placeholder }}">

            <label for="email">{{ t.email }}</label>
            <input type="email" id="email" required placeholder="{{ t.email_placeholder }}">

            <label for="phone">{{ t.phone }}</label>
            <input type="text" id="phone" placeholder="{{ t.phone_placeholder }}">

            <label for="password">Lösenord</label>
            <input type="password" id="password" required placeholder="Skriv ditt lösenord">

            <button type="submit">{{ t.register }}</button>
        </form>

        <p id="msg"></p>
    </div>

        <p id="msg"></p>
    </div>
</main>

<footer>
    <p style="text-align:center; padding: 20px 0;">
        &copy; 2026 Nordic Haven Hotel. {{ t.footer_rights }}
    </p>
</footer>

<script>
const uiText = {
    registrationSuccess: "{{ t.registration_success }}",
    registrationRedirecting: "{{ t.redirecting_message }}",
    genericError: "{{ t.generic_error }}"
};

function changeLanguage(lang) {
    fetch(`/set_language/${lang}`)
        .then(response => response.json())
        .then(data => {
            if (data.status === "success") {
                location.reload();
            }
        })
        .catch(() => {
            console.error("Language change failed");
        });
}

document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    const data = {
        firstname: document.getElementById("fname").value,
        lastname: document.getElementById("lname").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        password: document.getElementById("password").value
    };

    fetch("/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(result => {
        const msgEl = document.getElementById("msg");

        if (result.status === "success") {
            msgEl.innerText = "✅ " + uiText.registrationSuccess + " " + uiText.registrationRedirecting;
            msgEl.className = "success";

            setTimeout(() => {
                window.location.href = `/booking.html?customer_id=${result.customer_id}`;
            }, 2000);
        } else {
            msgEl.innerText = "❌ " + (result.message || uiText.genericError);
            msgEl.className = "error";
        }
    })
    .catch(() => {
        const msgEl = document.getElementById("msg");
        msgEl.innerText = "❌ " + uiText.genericError;
        msgEl.className = "error";
    });
});
</script>

</body>
</html>
