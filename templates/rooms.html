<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Rooms – Nordic Haven Hotel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="rooms-page">

<nav>
    <a href="/">Hem</a>
</nav>

<header class="rooms-hero">
    <h1>Tillgängliga rum</h1>
</header>

<main class="rooms-wrapper">

  {% for room in rooms %}
    <section class="room-showcase">
        <img src="{{ url_for('static', filename=room[5]) }}" alt="{{ room[1] }}">
        <div class="room-overlay">
            <h2>{{ room[1] }}</h2>
            <p>{{ room[2] }}</p>
            <span class="price">{{ room[4] }} SEK / natt</span>
            <button onclick="addRoom('{{ room[0] }}')">Lägg till rum</button>
        </div>
    </section>
    {% else %}
    <div style="text-align: center; width: 100%; color: white; margin-top: 50px;">
        <h2>Tyvärr!</h2>
        <p>Vi har inga lediga rum för dessa datum och det antalet gäster.</p>
    </div>
    {% endfor %}

</main>

<!-- BOKA NU -->
<div style="text-align:center; margin: 40px 0;">
    <button onclick="goToRegister()" style="
        padding: 15px 40px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 30px;
        border: none;
        background: linear-gradient(90deg, #0ea5e9, #2dd4bf);
        color: white;
        cursor: pointer;">
        Boka nu
    </button>
</div>

<p id="room-message" style="text-align:center; font-weight:bold; margin-top:20px;"></p>

<script>
// Lägg till rum via backend
function addRoom(roomId) {
    fetch("/api/selectRoom", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ room_id: roomId })
    })
    .then(res => res.json())
    .then(data => {
        const msg = document.getElementById("room-message");

        if (data.status === "success") {
            msg.innerText = "✅ Rummet har lagts till i din bokning";
            msg.style.color = "green";
        } else {
            msg.innerText = "❌ " + data.message;
            msg.style.color = "red";
        }
    })
    .catch(() => {
        const msg = document.getElementById("room-message");
        msg.innerText = "❌ Kunde inte lägga till rummet";
        msg.style.color = "red";
    });
}

// Gå till kundregistrering
function goToRegister() {
    fetch("/api/hasSelectedRooms")
        .then(res => res.json())
        .then(data => {
            if (data.hasRooms) {
                window.location.href = "kunder.html";
            } else {
                const msg = document.getElementById("room-message");
                msg.innerText = "⚠️ Välj minst ett rum innan du fortsätter";
                msg.style.color = "orange";
            }
        });
}
</script>

</body>
</html>
