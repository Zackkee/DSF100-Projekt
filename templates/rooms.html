<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rooms – Nordic Haven Hotel</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
/* ===== Toast Advanced ===== */
.toast {
position: fixed;
top: 30px;
left: 50%;
transform: translateX(-50%) scale(0.8);
min-width: 280px;
max-width: 90%;
background: #111827;
color: white;
padding: 16px 20px;
border-radius: 14px;
display: flex;
align-items: center;
gap: 10px;
font-weight: 600;
opacity: 0;
transition: all 0.4s ease;
z-index: 9999;
box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.toast.show {
opacity: 1;
transform: translateX(-50%) scale(1);
}

#toast-icon {
font-size: 20px;
}

.toast-success { background: #10b981; }
.toast-error { background: #ef4444; }
.toast-warning { background: #f59e0b; }

.toast-progress {
position: absolute;
bottom: 0;
left: 0;
height: 4px;
background: rgba(255,255,255,0.7);
width: 100%;
animation: progress 3s linear forwards;
}

@keyframes progress {
from { width: 100%; }
to { width: 0%; }
}
</style>
</head>

<body class="rooms-page">

<nav>
<a href="/">Hem</a>
</nav>

<header class="rooms-hero">
<h1>Tillgängliga rum</h1>
</header>

<main class="rooms-wrapper">

{% for room in rooms %}
<section class="room-showcase">
<img src="{{ url_for('static', filename=room[5]) }}" alt="{{ room[1] }}">
<div class="room-overlay">
<h2>{{ room[1] }}</h2>
<p>{{ room[2] }}</p>
<span class="price">{{ room[4] }} SEK / natt</span>
<button onclick="addRoom('{{ room[0] }}')">Lägg till rum</button>
</div>
</section>
{% else %}
<div style="text-align: center; width: 100%; color: white; margin-top: 50px;">
<h2>Tyvärr!</h2>
<p>Vi har inga lediga rum för dessa datum och det antalet gäster.</p>
</div>
{% endfor %}

</main>

<!-- ===== Boka nu ===== -->
<div style="text-align:center; margin: 40px 0;">
<button onclick="goToRegister()" style="
padding: 15px 40px;
font-size: 18px;
font-weight: bold;
border-radius: 30px;
border: none;
background: linear-gradient(90deg, #0ea5e9, #2dd4bf);
color: white;
cursor: pointer;">
Boka nu
</button>
</div>

<!-- ===== Toast ===== -->
<div id="toast" class="toast">
<span id="toast-icon"></span>
<span id="toast-text"></span>
<div class="toast-progress"></div>
</div>

<script>
// ===== Toast System =====
function showToast(message, type = "success") {
const toast = document.getElementById("toast");
const text = document.getElementById("toast-text");
const icon = document.getElementById("toast-icon");

text.innerText = message;

// Reset classes
toast.className = "toast";

if (type === "success") {
toast.classList.add("toast-success");
icon.innerText = "✅";
playSound();
} else if (type === "error") {
toast.classList.add("toast-error");
icon.innerText = "❌";
} else {
toast.classList.add("toast-warning");
icon.innerText = "⚠️";
}

toast.classList.add("show");

// Restart progress bar
const progress = toast.querySelector(".toast-progress");
progress.style.animation = "none";
progress.offsetHeight;
progress.style.animation = null;

setTimeout(() => {
toast.classList.remove("show");
}, 3000);
}

// 🔔 Sound
function playSound() {
const audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
audio.volume = 0.3;
audio.play();
}

// ===== Add Room =====
function addRoom(roomId) {
fetch("/api/selectRoom", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ room_id: roomId })
})
.then(res => res.json())
.then(data => {
if (data.status === "success") {
showToast("Rummet har lagts till i din bokning", "success");
} else {
showToast(data.message || "Fel inträffade", "error");
}
})
.catch(() => {
showToast("Kunde inte lägga till rummet", "error");
});
}

// ===== Continue Booking =====
function goToRegister() {
fetch("/api/hasSelectedRooms")
.then(res => res.json())
.then(data => {
if (data.hasRooms) {
window.location.href = "kunder.html";
} else {
showToast("Välj minst ett rum innan du fortsätter", "warning");
}
});
}
</script>

</body>
</html>
