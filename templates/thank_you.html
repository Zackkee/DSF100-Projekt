<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.thank_you_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body style="display:flex; justify-content:center; align-items:center; height:100vh; background: linear-gradient(135deg, #e0f2fe, #ccfbf1);">

    <div style="
        background:white;
        padding:50px;
        border-radius:20px;
        text-align:center;
        max-width:600px;
        box-shadow:0 20px 50px rgba(0,0,0,0.15);
    ">

        <h1 style="font-size:40px;">🎉 {{ t.thank_you_title }}</h1>

        <p style="font-size:18px; margin:20px 0;">
            {{ t.thank_you_message_1 }}
        </p>

        <p style="font-size:18px;">
            {{ t.thank_you_message_2 }}
        </p>

        <br>

        <a href="/" style="
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            border-radius:25px;
            background:linear-gradient(90deg,#0ea5e9,#2dd4bf);
            color:white;
            text-decoration:none;
            font-weight:bold;
        ">
            {{ t.back_home_button }}
        </a>

        <p style="margin-top:15px; font-size:14px; color:gray;">
            {{ t.redirect_note }}
        </p>

    </div>

    <script>
        setTimeout(() => {
            window.location.href = "/";
        }, 5000);
    </script>

</body>
</html>
