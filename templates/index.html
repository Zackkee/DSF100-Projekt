<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nordic Haven Hotel | Start</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="index-background">

    <!-- ===== Navigation ===== -->
    <header>
        <nav style="display:flex; justify-content:space-between; align-items:center; padding: 15px 30px;">
            <div>
                <a href="/kunder.html">{{ t.create_account }}</a>
                <a id="bookings-link" href="/mina_bokningar.html">{{ t.my_bookings }}</a>
            </div>

            <div>
                <button onclick="changeLanguage('sv')" style="
                    padding: 8px 14px;
                    margin-right: 8px;
                    border: none;
                    border-radius: 20px;
                    cursor: pointer;">
                    Svenska
                </button>

                <button onclick="changeLanguage('en')" style="
                    padding: 8px 14px;
                    border: none;
                    border-radius: 20px;
                    cursor: pointer;">
                    English
                </button>
            </div>
        </nav>
    </header>

    <!-- ===== Innehåll ===== -->
    <main class="container">

        <!-- Hero -->
        <section>
            <h1>{{ t.welcome_title }}</h1>

            <p>
                {{ t.welcome_text_1 }}
                <strong>Nordic Haven Hotel</strong>
                {{ t.welcome_text_2 }}
            </p>
        </section>

        <!-- Sök rum -->
        <section>
            <h1>{{ t.find_room_title }}</h1>

            <form action="/rooms.html" method="GET">
                <label for="check_in_date">{{ t.check_in }}</label>
                <input type="date" id="check_in_date" name="check_in_date" required>

                <label for="check_out_date">{{ t.check_out }}</label>
                <input type="date" id="check_out_date" name="check_out_date" required>

                <label for="antal_personer">{{ t.guests }}</label>
                <input type="number" id="antal_personer" name="antal_personer" min="1" required>

                <button type="submit">{{ t.show_available_rooms }}</button>
            </form>
        </section>

        <!-- Om hotellet -->
        <section>
            <h2>{{ t.about_hotel_title }}</h2>

            <p>{{ t.about_hotel_text_1 }}</p>

            <p>{{ t.about_hotel_text_2 }}</p>
        </section>

    </main>

    <!-- ===== Footer ===== -->
    <footer>
        <p style="text-align:center; padding: 20px 0;">
            &copy; 2026 Nordic Haven Hotel. {{ t.footer_rights }}
        </p>
    </footer>

    <!-- ===== Script ===== -->
    <script>
        function changeLanguage(lang) {
            fetch(`/set_language/${lang}`)
                .then(response => response.json())
                .then(data => {
                    if (data.status === "success") {
                        location.reload();
                    }
                })
                .catch(() => {
                    console.error("Language change failed");
                });
        }

        const params = new URLSearchParams(window.location.search);
        const email = params.get("email");

        if (email) {
            document.getElementById("bookings-link").href =
                `/mina_bokningar.html?email=${email}`;
        }
    </script>

</body>
</html>
