<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking – Nordic Haven Hotel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <header>
        <nav style="display:flex; justify-content:space-between; align-items:center; padding: 15px 30px;">
            <div>
                {% if session.get('customer_name') %}
                    <span style="color: rgb(0, 0, 0); margin-right: 15px;">
                        {{ t.logged_in_as }} <b>{{ session.get('customer_name') }}</b>
                    </span>
                    <a id="bookings-link" href="/mina_bokningar.html?email={{ session.get('customer_email') }}">{{ t.my_bookings }}</a>
                    <a href="/logout">{{ t.logout }}</a>
                {% else %}
                    <a href="/kunder.html">{{ t.create_account }}</a>
                    <a href="/login.html">{{ t.login }}</a>
                {% endif %}
            </div>

            <div>
                <button onclick="changeLanguage('sv')" style="
                    padding: 8px 14px;
                    margin-right: 8px;
                    border: none;
                    border-radius: 20px;
                    cursor: pointer;">
                    Svenska
                </button>

                <button onclick="changeLanguage('en')" style="
                    padding: 8px 14px;
                    border: none;
                    border-radius: 20px;
                    cursor: pointer;">
                    English
                </button>
            </div>
        </nav>
    </header>

    <main class="container" style="max-width: 900px; margin: 40px auto;">
        <h1>{{ t.confirm_booking }}</h1>

        <div id="rooms"></div>
        <p id="price"></p>

        <form id="booking-form">
            <input type="hidden" id="customer_id" readonly>

            <button type="submit">{{ t.confirm_booking }}</button>
        </form>

        <p id="message"></p>
    </main>

    <footer>
        <p style="text-align:center; padding: 20px 0;">
            &copy; 2026 Nordic Haven Hotel. {{ t.footer_rights }}
        </p>
    </footer>

    <script>
    const uiText = {
        selectedRooms: "{{ t.selected_rooms }}",
        perNight: "{{ t.per_night }}",
        totalPrice: "{{ t.total_price }}",
        noActiveBooking: "{{ t.no_active_booking }}",
        bookingInfoError: "{{ t.booking_info_error }}",
        bookingConfirmed: "{{ t.booking_confirmed_message }}",
        bookingFailed: "{{ t.booking_failed_message }}",
        technicalError: "{{ t.technical_error }}",
        emptyCart: "{{ t.empty_cart }}"
    };

    function changeLanguage(lang) {
        fetch(`/set_language/${lang}`)
            .then(response => response.json())
            .then(data => {
                if (data.status === "success") {
                    location.reload();
                }
            })
            .catch(() => {
                console.error("Language change failed");
            });
    }


    const customerId = "{{ session.get('customer_id', '') }}";
    document.getElementById("customer_id").value = customerId;


    function loadSummary() {
        fetch('/api/getBookingSummary')
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('rooms'); 
            const priceEl = document.getElementById('price'); 
            
            if (data.status === 'success') {
                list.innerHTML = ""; 
                
            if (data.rooms.length === 0) {
                list.innerHTML = `<p>${uiText.emptyCart}</p>`;
                priceEl.innerText = "0 SEK";
                return;
}

                data.rooms.forEach(room => {
                    list.innerHTML += `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #eee;">
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <img src="/static/${room.image}" style="width: 70px; height: 70px; object-fit: cover; border-radius: 5px;">
                                <div>
                                    <b>${room.name}</b><br>
                                    <span>${room.price} SEK ${uiText.perNight}</span>
                                    
                                </div>
                            </div>
                            <button type="button" onclick="removeRoom('${room.id}')" style="background: #ff4444; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer;">
                                {{ t.remove | default('Ta bort') }}
                            </button>
                        </div>
                    `;
                });
                priceEl.innerHTML = "Totalpris: " + data.total_price + " SEK" + "<br>" + "<br>" +
                "Inchekningsdatum: " + data.check_in + "<br>" + "<br>" + "Utcheckningsdatum: " + data.check_out;
            } else {
                list.innerHTML = `<p>${data.message || uiText.emptyCart}</p>`;
                priceEl.innerText = "0 SEK";
            }
        })
        .catch(err => {
            console.error("Fel:", err);
            document.getElementById('rooms').innerHTML = "<p>Kunde inte hämta bokningsinformationen.</p>";
        });
    }


    function removeRoom(roomId) {
        fetch('/api/removeFromBasket', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ room_id: roomId })
        })
        .then(res => res.json())
        .then(result => {
            if (result.status === 'success') {
                location.reload(); 
            } else {
                alert("Kunde inte ta bort rummet.");
            }
        });
    }


    document.getElementById("booking-form").addEventListener("submit", e => {
        e.preventDefault();


        const currentCustomerId = document.getElementById("customer_id").value;

        if (!currentCustomerId) {
            const msg = document.getElementById("message");
            msg.innerText = "❌ Kund-ID saknas. Vänligen logga in för att boka.";
            msg.className = "error";
            return;
        }

        fetch("/api/bookRoom", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ customer_id: currentCustomerId })
        })
        .then(res => res.json())
        .then(data => {
            const msg = document.getElementById("message");

            if (data.status === "success") {
                msg.innerText = "✅ " + uiText.bookingConfirmed;
                msg.className = "success";
                setTimeout(() => {
                    window.location.href = "/payment.html";
                }, 1500);
            } else {
                msg.innerText = "❌ " + uiText.bookingFailed + ": " + data.message;
                msg.className = "error";
            }
        })
        .catch(() => {
            const msg = document.getElementById("message");
            msg.innerText = "❌ " + uiText.technicalError;
            msg.className = "error";
        });
    });

    loadSummary();

    </script>

</body>
</html>
